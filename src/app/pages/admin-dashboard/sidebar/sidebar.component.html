<div class="sidebar-root">
  <div
    class="sidebar-overlay"
    [class.sidebar-overlay--visible]="open"
    role="presentation"
    (click)="onOverlayPointerDown()"></div>

  <aside
    class="sidebar-drawer"
    [class.sidebar-drawer--open]="open"
    role="dialog"
    aria-modal="true"
    [attr.aria-hidden]="!open"
    [attr.aria-label]="'nav.ariaAdminNav' | translate">
    <header class="sidebar-header">
      <div class="sidebar-header__user">
        <div class="sidebar-header__avatar" aria-hidden="true">{{ initials }}</div>
        <div class="sidebar-header__meta">
          <span class="sidebar-header__name">{{ userName || ('nav.sidebarAdmin' | translate) }}</span>
          <span class="sidebar-header__role">{{ userRole }}</span>
        </div>
      </div>
      <button
        mat-icon-button
        type="button"
        class="sidebar-header__close"
        [attr.aria-label]="'nav.ariaCloseMenu' | translate"
        (click)="close()">
        <mat-icon>close</mat-icon>
      </button>
    </header>

    <nav class="sidebar-nav" role="navigation" [attr.aria-label]="'nav.ariaWorkspace' | translate">
      <ul class="sidebar-nav__list">
        <li *ngFor="let link of workspaceLinks" class="sidebar-nav__item">
          <a
            class="sidebar-nav__link"
            [class.sidebar-nav__link--active]="isWorkspaceActive(link.path)"
            [attr.href]="'/admin/' + link.path"
            (click)="onWorkspaceNav($event, link.path)">
            <mat-icon class="sidebar-nav__icon" aria-hidden="true">{{ link.icon }}</mat-icon>
            <span class="sidebar-nav__label">{{ workspaceLabelKey(link.path) | translate }}</span>
            <span
              class="sidebar-nav__badge"
              [class.sidebar-nav__badge--alert]="link.path === 'notifications' || link.path === 'requests'"
              *ngIf="workspaceLinkBadge(link.path) as badgeCount"
              [attr.aria-label]="workspaceLinkBadgeAriaKey(link.path) | translate: { n: badgeCount }">
              {{ badgeCount }}
            </span>
          </a>
        </li>
      </ul>

      <div class="sidebar-nav__divider" role="separator"></div>

      <ul class="sidebar-nav__list">
        <li *ngFor="let t of toolLinks" class="sidebar-nav__item">
          <button type="button" class="sidebar-nav__link sidebar-nav__link--button" (click)="onTool(t.action)">
            <mat-icon class="sidebar-nav__icon" aria-hidden="true">{{ t.icon }}</mat-icon>
            <span class="sidebar-nav__label">{{ toolLabelKey(t.action) | translate }}</span>
            <span
              class="sidebar-nav__badge sidebar-nav__badge--alert"
              *ngIf="t.action === 'ai-summary' && alertBadgeCount > 0"
              [attr.aria-label]="'admin.alertsAria' | translate: { n: alertBadgeCount }">
              {{ alertBadgeCount }}
            </span>
          </button>
        </li>
      </ul>
    </nav>

    <footer class="sidebar-footer">
      <button type="button" class="sidebar-footer__logout" (click)="onLogout()">
        <mat-icon aria-hidden="true">logout</mat-icon>
        <span>{{ 'nav.logOut' | translate }}</span>
      </button>
    </footer>
  </aside>
</div>
