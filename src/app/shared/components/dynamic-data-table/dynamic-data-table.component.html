<ng-container *ngIf="config?.columns?.length; else noConfig">
  <div class="dynamic-table" [class.dynamic-table--embedded]="embedded">
    <mat-card class="dynamic-table__card" [class.mat-elevation-z2]="!embedded">
      <div class="dynamic-table__head" *ngIf="showTableHead">
        <h2 class="dynamic-table__title" *ngIf="config?.title as title">{{ title }}</h2>
        <mat-form-field *ngIf="showFilter" appearance="outline" class="dynamic-table__filter">
          <mat-label>Filter</mat-label>
          <input matInput [formControl]="filterControl" [placeholder]="filterPlaceholder" />
          <mat-icon matSuffix class="dynamic-table__filter-icon" *ngIf="loading">hourglass_empty</mat-icon>
        </mat-form-field>
      </div>

      <div class="dynamic-table__scroll">
        <div class="dynamic-table__loading" *ngIf="loading" aria-hidden="true"></div>
        <table mat-table matSort [dataSource]="dataSource" class="dynamic-table__mat">
          <ng-container *ngFor="let col of columns; trackBy: trackByKey" [matColumnDef]="col.key">
            <th
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              [disabled]="!isSortable(col)"
              [style.min-width]="col.minWidth || null"
              class="dynamic-table__th">
              {{ col.label }}
            </th>
            <td mat-cell *matCellDef="let row" [style.min-width]="col.minWidth || null" class="dynamic-table__td">
              <button
                *ngIf="col.cellControl === 'adminBudgetDescription'"
                mat-button
                type="button"
                class="dynamic-table__link dynamic-table__link--view"
                [attr.title]="'View full description'"
                [attr.aria-label]="'View budget description'"
                (click)="onAdminBudgetDescriptionClick(row, $event)">
                View
              </button>
              <button
                *ngIf="col.cellControl === 'adminBudgetEdit'"
                mat-button
                type="button"
                class="dynamic-table__link dynamic-table__link--edit"
                (click)="onAdminBudgetEditClick(row, $event)">
                Edit
              </button>
              <button
                *ngIf="col.cellControl === 'adminBudgetDelete'"
                mat-button
                type="button"
                class="dynamic-table__link dynamic-table__link--delete"
                (click)="onAdminBudgetDeleteClick(row, $event)">
                Delete
              </button>
              <ng-container
                *ngIf="
                  col.cellControl !== 'adminBudgetDescription' &&
                  col.cellControl !== 'adminBudgetEdit' &&
                  col.cellControl !== 'adminBudgetDelete'
                "
                [ngSwitch]="col.cellControl">
                <ng-container *ngSwitchCase="'adminExpenseEdit'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--edit"
                    (click)="onAdminExpenseEditClick(row)">
                    Edit
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'adminExpenseReceipt'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--view"
                    (click)="openReceiptModal(row)">
                    View
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'adminExpenseDelete'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--delete"
                    (click)="onAdminExpenseDeleteClick(row)">
                    Delete
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseActions'">
                  <span class="dynamic-table__actions">
                    <button
                      mat-button
                      type="button"
                      class="dynamic-table__link dynamic-table__link--view"
                      (click)="onUserExpenseAction('notes', row)">
                      View
                    </button>
                    <button
                      mat-button
                      type="button"
                      class="dynamic-table__link dynamic-table__link--edit"
                      (click)="onUserExpenseAction('edit', row)">
                      Edit
                    </button>
                    <button
                      mat-button
                      type="button"
                      class="dynamic-table__link dynamic-table__link--delete"
                      (click)="onUserExpenseAction('delete', row)">
                      Delete
                    </button>
                  </span>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseViewNotes'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--view"
                    (click)="onUserExpenseAction('notes', row)">
                    View
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseEdit'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--edit"
                    (click)="onUserExpenseAction('edit', row)">
                    Edit
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseDelete'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--delete"
                    (click)="onUserExpenseAction('delete', row)">
                    Delete
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseReceipt'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--view"
                    (click)="openReceiptModal(row)">
                    View
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'expenseReceiptDownload'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--view"
                    [disabled]="!receiptHref(row)"
                    [attr.title]="receiptHref(row) ? 'Download receipt' : 'No receipt uploaded'"
                    (click)="downloadReceipt(row)">
                    Download
                  </button>
                </ng-container>
                <ng-container *ngSwitchDefault>
                  <span>{{ formatCell(row, col) }}</span>
                </ng-container>
              </ng-container>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumnKeys; sticky: true" class="dynamic-table__header-row"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumnKeys" class="dynamic-table__data-row"></tr>

          <tr class="mat-row dynamic-table__nodata-row" *matNoDataRow>
            <td class="mat-cell dynamic-table__empty" [attr.colspan]="displayedColumnKeys.length">
              {{ loading ? 'Loading…' : 'No data to display' }}
            </td>
          </tr>
        </table>
      </div>

      <mat-paginator
        *ngIf="!hidePaginator"
        [pageSizeOptions]="pageSizeOptions"
        [length]="totalCount"
        showFirstLastButtons
        class="dynamic-table__paginator"
      ></mat-paginator>
    </mat-card>
  </div>

  <div
    *ngIf="receiptModalOpen"
    class="receipt-modal-backdrop"
    role="presentation"
    (click)="closeReceiptModal()">
    <div
      class="receipt-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="receipt-modal-title"
      (click)="$event.stopPropagation()">
      <div class="receipt-modal__toolbar">
        <h2 id="receipt-modal-title" class="receipt-modal__title">Receipt</h2>
        <button mat-icon-button type="button" aria-label="Close receipt" (click)="closeReceiptModal()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="receipt-modal__body">
        <ng-container *ngIf="receiptModalHasFile; else receiptModalEmpty">
          <img
            *ngIf="receiptPreviewImageUrl"
            [src]="receiptPreviewImageUrl"
            class="receipt-modal__img"
            alt="Receipt preview" />
          <iframe
            *ngIf="receiptPreviewFrameUrl && !receiptPreviewImageUrl"
            [src]="receiptPreviewFrameUrl"
            class="receipt-modal__frame"
            title="Receipt preview"></iframe>
        </ng-container>
        <ng-template #receiptModalEmpty>
          <p class="dynamic-table__muted receipt-modal__empty">No receipt was uploaded for this expense.</p>
        </ng-template>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #noConfig>
  <p class="dynamic-table__no-config">Table configuration is not available.</p>
</ng-template>
