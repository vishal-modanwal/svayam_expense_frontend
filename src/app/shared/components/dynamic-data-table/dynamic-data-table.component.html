<ng-container *ngIf="config?.columns?.length; else noConfig">
  <div class="dynamic-table" [class.dynamic-table--embedded]="embedded">
    <mat-card class="dynamic-table__card" [class.mat-elevation-z2]="!embedded">
      <div class="dynamic-table__head" *ngIf="showTableHead">
        <h2 class="dynamic-table__title" *ngIf="config?.title as title">{{ title }}</h2>
        <mat-form-field *ngIf="showFilter" appearance="outline" class="dynamic-table__filter">
          <mat-label>Filter</mat-label>
          <input matInput [formControl]="filterControl" [placeholder]="filterPlaceholder" />
          <mat-icon matSuffix class="dynamic-table__filter-icon" *ngIf="loading">hourglass_empty</mat-icon>
        </mat-form-field>
      </div>

      <div class="dynamic-table__scroll">
        <div class="dynamic-table__loading" *ngIf="loading" aria-hidden="true"></div>
        <table mat-table matSort [dataSource]="dataSource" class="dynamic-table__mat" [class.dynamic-table__mat--modern]="embedded">
          <ng-container *ngFor="let col of columns; trackBy: trackByKey" [matColumnDef]="col.key">
            <th
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              [disabled]="!isSortable(col)"
              [style.min-width]="col.minWidth || null"
              class="dynamic-table__th"
              [ngClass]="{
                'dynamic-table__th--amount': embedded && isAmountColumn(col),
                'dynamic-table__th--center': embedded && isCenteredControlColumn(col),
                'dynamic-table__th--title': embedded && isTitleColumn(col)
              }"
            >
              {{ col.label }}
            </th>
            <td
              mat-cell
              *matCellDef="let row"
              [style.min-width]="col.minWidth || null"
              class="dynamic-table__td"
              [ngClass]="{
                'dynamic-table__td--amount': embedded && isAmountColumn(col),
                'dynamic-table__td--center': embedded && isCenteredControlColumn(col),
                'dynamic-table__td--title': embedded && isTitleColumn(col),
                'dynamic-table__td--payment': embedded && isPaymentColumn(col)
              }"
            >
              <ng-container [ngSwitch]="col.cellControl">
                <ng-container *ngSwitchCase="'adminExpenseEdit'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--edit"
                    [class.dynamic-table__link--cell]="embedded"
                    (click)="onAdminExpenseEditClick(row)">
                    Edit
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'adminExpenseReceipt'">
                  <a
                    *ngIf="receiptHref(row) as href"
                    mat-button
                    type="button"
                    class="dynamic-table__link"
                    [class.dynamic-table__link--cell]="embedded"
                    [href]="href"
                    target="_blank"
                    rel="noopener noreferrer">
                    Open
                  </a>
                  <span *ngIf="!receiptHref(row)" class="dynamic-table__muted" aria-hidden="true">—</span>
                </ng-container>
                <ng-container *ngSwitchCase="'adminExpenseDelete'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--delete"
                    [class.dynamic-table__link--cell]="embedded"
                    (click)="onAdminExpenseDeleteClick(row)">
                    Delete
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseActions'">
                  <span class="dynamic-table__actions">
                    <button
                      mat-icon-button
                      type="button"
                      aria-label="Notes"
                      (click)="onUserExpenseAction('notes', row)">
                      <mat-icon>notes</mat-icon>
                    </button>
                    <button
                      mat-icon-button
                      type="button"
                      aria-label="Edit"
                      (click)="onUserExpenseAction('edit', row)">
                      <mat-icon>edit</mat-icon>
                    </button>
                    <button
                      mat-icon-button
                      type="button"
                      aria-label="Delete"
                      (click)="onUserExpenseAction('delete', row)">
                      <mat-icon>delete</mat-icon>
                    </button>
                    <a
                      *ngIf="receiptHref(row) as href"
                      mat-button
                      type="button"
                      class="dynamic-table__link"
                      [href]="href"
                      target="_blank"
                      rel="noopener noreferrer">
                      Receipt
                    </a>
                    <span *ngIf="!receiptHref(row)" class="dynamic-table__muted" aria-hidden="true">—</span>
                  </span>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseViewNotes'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--view"
                    [class.dynamic-table__link--cell]="embedded"
                    (click)="onUserExpenseAction('notes', row)">
                    View
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseEdit'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--edit"
                    [class.dynamic-table__link--cell]="embedded"
                    (click)="onUserExpenseAction('edit', row)">
                    Edit
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseDelete'">
                  <button
                    mat-button
                    type="button"
                    class="dynamic-table__link dynamic-table__link--delete"
                    [class.dynamic-table__link--cell]="embedded"
                    (click)="onUserExpenseAction('delete', row)">
                    Delete
                  </button>
                </ng-container>
                <ng-container *ngSwitchCase="'userExpenseReceipt'">
                  <a
                    *ngIf="receiptHref(row) as href"
                    mat-button
                    type="button"
                    class="dynamic-table__link"
                    [class.dynamic-table__link--cell]="embedded"
                    [href]="href"
                    target="_blank"
                    rel="noopener noreferrer">
                    Open
                  </a>
                  <span *ngIf="!receiptHref(row)" class="dynamic-table__muted" aria-hidden="true">—</span>
                </ng-container>
                <ng-container *ngSwitchDefault>
                  <span *ngIf="embedded && isCategoryColumn(col)" class="dynamic-table__badge">{{ formatCell(row, col) }}</span>
                  <span *ngIf="!(embedded && isCategoryColumn(col))">{{ formatCell(row, col) }}</span>
                </ng-container>
              </ng-container>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumnKeys; sticky: true" class="dynamic-table__header-row"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumnKeys" class="dynamic-table__data-row"></tr>

          <tr class="mat-row dynamic-table__nodata-row" *matNoDataRow>
            <td class="mat-cell dynamic-table__empty" [attr.colspan]="displayedColumnKeys.length">
              {{ loading ? 'Loading…' : 'No data to display' }}
            </td>
          </tr>
        </table>
      </div>

      <mat-paginator
        *ngIf="!hidePaginator"
        [pageSizeOptions]="pageSizeOptions"
        [length]="totalCount"
        showFirstLastButtons
        class="dynamic-table__paginator"
      ></mat-paginator>
    </mat-card>
  </div>
</ng-container>

<ng-template #noConfig>
  <p class="dynamic-table__no-config">Table configuration is not available.</p>
</ng-template>
